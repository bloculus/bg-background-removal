<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppression de fond - Machine à Visuels</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    #drop-zone {
      width: 100%;
      max-width: 480px;
      border: 2px dashed #ccc;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      background: white;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #6c63ff;
      background: #f8f7ff;
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: #aaa;
      margin-bottom: 12px;
    }

    #drop-zone p {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    #drop-zone strong {
      color: #6c63ff;
    }

    #file-input { display: none; }

    #status {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #666;
      min-height: 24px;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 32px;
      width: 100%;
      max-width: 900px;
    }

    .images {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .image-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      flex: 1;
      min-width: 260px;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .image-card label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 10px;
    }

    .image-card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    #result-img {
      background-image: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%);
      background-size: 20px 20px;
    }

    #download-btn {
      padding: 14px 32px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #download-btn:hover { background: #574fd6; }
    #download-btn:active { transform: scale(0.98); }

    #reset-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    #reset-btn:hover { color: #555; }

    footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #bbb;
      text-align: center;
    }

    footer a { color: #bbb; text-decoration: underline; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>

  <h1>🪄 Suppression de fond</h1>
  <p class="subtitle">Traitement 100 % local sur ton navigateur - aucune image n'est envoyée sur un serveur externe</p>

  <div id="drop-zone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
    </svg>
    <p>Glisse une image ici<br>ou <strong>clique pour choisir</strong></p>
    <p style="margin-top:8px;font-size:0.8rem;color:#bbb">PNG, JPG, WebP</p>
    <input type="file" id="file-input" accept="image/*" />
  </div>

  <div id="status"></div>

  <div id="result">
    <div class="images">
      <div class="image-card">
        <label>Original</label>
        <img id="original-img" src="" alt="Original" />
      </div>
      <div class="image-card">
        <label>Fond supprimé</label>
        <img id="result-img" src="" alt="Résultat" />
      </div>
    </div>
    <button id="download-btn">Télécharger le PNG</button>
    <button id="reset-btn">Traiter une autre image</button>
  </div>

  <footer>
    Propulsé par <a href="https://github.com/imgly/background-removal-js" target="_blank">@imgly/background-removal</a>
    &mdash; licence <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL-3.0</a>
    &mdash; <a href="https://github.com/bloculus/bg-back-removal" target="_blank">Code source</a>
  </footer>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const originalImg = document.getElementById('original-img');
    const resultImg = document.getElementById('result-img');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');

    let resultBlob = null;
    let removeBackground = null;
    let originalBaseName = 'image';

    // Load the library asynchronously — does not block UI events
    (async () => {
      try {
        const mod = await import('https://esm.sh/@imgly/background-removal@1.4.5');
        removeBackground = mod.removeBackground;
      } catch (e) {
        console.error('Erreur chargement librairie :', e);
        status.textContent = 'Erreur : impossible de charger la librairie. Vérifie ta connexion internet.';
      }
    })();

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) processFile(fileInput.files[0]);
    });

    async function processFile(file) {
      if (!removeBackground) {
        status.innerHTML = '<span class="spinner"></span> Chargement de la librairie, patiente quelques secondes...';
        // wait for library to load
        await new Promise(r => setTimeout(r, 3000));
        if (!removeBackground) {
          status.textContent = 'Erreur : librairie non chargée. Recharge la page.';
          return;
        }
      }

      originalBaseName = file.name.replace(/\.[^/.]+$/, '');
      dropZone.style.display = 'none';
      result.style.display = 'none';
      status.innerHTML = '<span class="spinner"></span> Chargement du modèle IA... (première fois : ~20s)';
      originalImg.src = URL.createObjectURL(file);

      try {
        const blob = await removeBackground(file, {
          progress: (key, current, total) => {
            if (key === 'compute:inference') {
              status.innerHTML = '<span class="spinner"></span> Traitement en cours...';
            } else if (current < total) {
              status.innerHTML = '<span class="spinner"></span> Chargement du modèle IA...';
            }
          }
        });

        resultBlob = blob;
        resultImg.src = URL.createObjectURL(blob);
        status.textContent = '';
        result.style.display = 'flex';

      } catch (err) {
        status.textContent = 'Erreur : ' + err.message;
        dropZone.style.display = 'block';
        console.error(err);
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlob);
      a.download = originalBaseName + '-withoutbg.png';
      a.click();
    });

    resetBtn.addEventListener('click', () => {
      result.style.display = 'none';
      dropZone.style.display = 'block';
      fileInput.value = '';
      resultBlob = null;
    });
  </script>

</body>
</html>
