<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Détourage express</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪄</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #fdfaff 0%, #f8f0ff 60%, #fffbf0 100%);
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 20px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #981DFF 0%, #C060FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      display: inline-flex;
      align-items: center;
      background: white;
      border: 1.5px solid #ede0ff;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 52px;
      box-shadow: 0 2px 8px rgba(152, 29, 255, 0.07);
    }

    #drop-zone {
      width: 100%;
      max-width: 520px;
      border: 2px dashed #ddd;
      border-radius: 24px;
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      background: white;
      box-shadow: 0 4px 24px rgba(152, 29, 255, 0.06);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #981DFF;
      background: #EDD9FF;
      box-shadow: 0 8px 32px rgba(152, 29, 255, 0.14);
    }

    #drop-zone svg {
      width: 52px;
      height: 52px;
      color: #bbb;
      margin-bottom: 16px;
    }

    #drop-zone:hover svg,
    #drop-zone.drag-over svg {
      color: #999;
    }

    #drop-zone p {
      color: #666;
      font-size: 1rem;
      line-height: 1.6;
    }

    #drop-zone strong {
      color: #981DFF;
      font-weight: 600;
    }

    .formats {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #bbb;
    }

    #drop-zone:hover .formats,
    #drop-zone.drag-over .formats {
      color: #888;
    }

    #file-input { display: none; }

    #status {
      margin-top: 28px;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ede0ff;
      border-top-color: #981DFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 44px;
      width: 100%;
      max-width: 940px;
      margin-left: auto;
      margin-right: auto;
    }

    .images {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .image-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      flex: 1;
      min-width: 280px;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .image-card label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #ccc;
      margin-bottom: 12px;
    }

    .image-card img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    #result-img {
      background-image: repeating-conic-gradient(#e8e8e8 0% 25%, white 0% 50%);
      background-size: 20px 20px;
    }

    #download-btn {
      padding: 16px 44px;
      background: #FBB638;
      color: #1a1a1a;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 20px rgba(251, 182, 56, 0.4);
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    #download-btn:hover {
      background: #E8A520;
      box-shadow: 0 6px 28px rgba(251, 182, 56, 0.5);
    }
    #download-btn:active { transform: scale(0.98); }

    #reset-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 12px 32px;
      transition: border-color 0.2s, color 0.2s;
    }

    #reset-btn:hover {
      border-color: #981DFF;
      color: #981DFF;
    }

    footer {
      margin-top: 60px;
      font-size: 0.75rem;
      color: #ccc;
      text-align: center;
    }

    footer a { color: #ccc; text-decoration: underline; }
    footer a:hover { color: #981DFF; }
  </style>
</head>
<body>

  <h1><span style="position:relative;top:-0.08em">🪄</span> Détourage express</h1>
  <p class="subtitle">Traitement 100% local dans le navigateur - aucune image n'est envoyée sur un serveur externe</p>

  <div id="drop-zone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
    </svg>
    <p>Glisse une image ici<br>ou <strong>clique pour sélectionner un fichier</strong></p>
    <p class="formats">PNG, JPG, WebP</p>
    <input type="file" id="file-input" accept="image/*" />
  </div>

  <div id="status"></div>

  <div id="result">
    <div class="images">
      <div class="image-card">
        <label>Original</label>
        <img id="original-img" src="" alt="Original" />
      </div>
      <div class="image-card">
        <label>Fond supprimé</label>
        <img id="result-img" src="" alt="Résultat" />
      </div>
    </div>
    <button id="download-btn">Télécharger le PNG</button>
    <button id="reset-btn">Traiter une autre image</button>
  </div>

  <footer>
    Propulsé par <a href="https://github.com/imgly/background-removal-js" target="_blank">@imgly/background-removal</a>
    &mdash; licence <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL-3.0</a>
    &mdash; <a href="https://github.com/bloculus/bg-background-removal" target="_blank">Code source</a>
  </footer>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const subtitle = document.querySelector('.subtitle');
    const result = document.getElementById('result');
    const originalImg = document.getElementById('original-img');
    const resultImg = document.getElementById('result-img');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');

    let resultBlob = null;
    let removeBackground = null;
    let originalBaseName = 'image';
    let modelUsed = false;

    // Load the library asynchronously — does not block UI events
    (async () => {
      try {
        const mod = await import('https://esm.sh/@imgly/background-removal@1.4.5');
        removeBackground = mod.removeBackground;
      } catch (e) {
        console.error('Erreur chargement librairie :', e);
        status.textContent = 'Erreur : impossible de charger la librairie. Vérifie ta connexion internet.';
      }
    })();

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) processFile(fileInput.files[0]);
    });

    async function processFile(file) {
      if (!removeBackground) {
        status.innerHTML = '<span class="spinner"></span> Chargement de la librairie, patiente quelques secondes...';
        await new Promise(r => setTimeout(r, 3000));
        if (!removeBackground) {
          status.textContent = 'Erreur : librairie non chargée. Recharge la page.';
          return;
        }
      }

      originalBaseName = file.name.replace(/\.[^/.]+$/, '');
      dropZone.style.display = 'none';
      result.style.display = 'none';
      status.innerHTML = modelUsed
        ? '<span class="spinner"></span> Traitement en cours...'
        : '<span class="spinner"></span> Chargement du modèle IA... (première fois : ~20s)';
      originalImg.src = URL.createObjectURL(file);

      try {
        let lastKey = '';
        const blob = await removeBackground(file, {
          progress: (key, current, total) => {
            const phase = key === 'compute:inference' ? 'inference' : 'loading';
            if (phase === lastKey) return;
            lastKey = phase;
            if (phase === 'inference') {
              status.innerHTML = '<span class="spinner"></span> Traitement en cours...';
            } else {
              status.innerHTML = '<span class="spinner"></span> Chargement du modèle IA...';
            }
          }
        });

        modelUsed = true;
        resultBlob = blob;
        resultImg.src = URL.createObjectURL(blob);
        status.style.display = 'none';
        subtitle.style.display = 'none';
        result.style.display = 'flex';

      } catch (err) {
        status.textContent = 'Erreur : ' + err.message;
        dropZone.style.display = 'block';
        console.error(err);
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlob);
      a.download = originalBaseName + '-withoutbg.png';
      a.click();
    });

    resetBtn.addEventListener('click', () => {
      result.style.display = 'none';
      dropZone.style.display = 'block';
      subtitle.style.display = '';
      status.style.display = '';
      status.innerHTML = '';
      fileInput.value = '';
      resultBlob = null;
    });
  </script>

</body>
</html>
